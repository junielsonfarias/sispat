# ===========================================
# SISPAT 2.0 - DOCKER COMPOSE PARA PRODUÇÃO
# ===========================================
# Segredos OBRIGATÓRIOS (a stack falha ao subir se faltarem):
#   DB_PASSWORD, REDIS_PASSWORD, JWT_SECRET
# Defina-os em um arquivo .env ao lado deste compose (NÃO versionar).

services:
  # ===========================================
  # Banco de Dados PostgreSQL
  # ===========================================
  postgres:
    image: postgres:15-alpine
    container_name: sispat-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: sispat_prod
      POSTGRES_USER: sispat_user
      POSTGRES_PASSWORD: ${DB_PASSWORD:?DB_PASSWORD é obrigatório}
      POSTGRES_INITDB_ARGS: "--encoding=UTF-8 --lc-collate=C --lc-ctype=C"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./backup:/backup
    # Bind só ao loopback: a app acessa via rede interna (postgres:5432); o host
    # mantém acesso local para backups/manutenção, sem expor à rede externa.
    ports:
      - "127.0.0.1:5432:5432"
    networks:
      - sispat-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U sispat_user -d sispat_prod"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ===========================================
  # Redis (Cache e Sessões)
  # ===========================================
  redis:
    image: redis:7-alpine
    container_name: sispat-redis
    restart: unless-stopped
    command: redis-server --appendonly yes --requirepass ${REDIS_PASSWORD:?REDIS_PASSWORD é obrigatório}
    volumes:
      - redis_data:/data
    # Bind só ao loopback (não expor o cache à rede externa do servidor).
    ports:
      - "127.0.0.1:6379:6379"
    networks:
      - sispat-network
    healthcheck:
      test: ["CMD-SHELL", "redis-cli -a \"$$REDIS_PASSWORD\" --no-auth-warning ping | grep -q PONG"]
      interval: 10s
      timeout: 5s
      retries: 5
    environment:
      REDIS_PASSWORD: ${REDIS_PASSWORD:?REDIS_PASSWORD é obrigatório}

  # ===========================================
  # Aplicação SISPAT
  # ===========================================
  sispat:
    build:
      context: .
      dockerfile: Dockerfile
      target: production
    container_name: sispat-app
    restart: unless-stopped
    environment:
      NODE_ENV: production
      DATABASE_URL: postgresql://sispat_user:${DB_PASSWORD:?DB_PASSWORD é obrigatório}@postgres:5432/sispat_prod
      # Redis: a app lê REDIS_HOST/REDIS_PORT/REDIS_PASSWORD (não REDIS_URL).
      ENABLE_REDIS: "true"
      REDIS_HOST: redis
      REDIS_PORT: "6379"
      REDIS_PASSWORD: ${REDIS_PASSWORD:?REDIS_PASSWORD é obrigatório}
      JWT_SECRET: ${JWT_SECRET:?JWT_SECRET é obrigatório}
      FRONTEND_URL: ${FRONTEND_URL:?FRONTEND_URL é obrigatório}
      CORS_ORIGIN: ${FRONTEND_URL:?FRONTEND_URL é obrigatório}
      PORT: 3000
    volumes:
      - uploads_data:/app/backend/uploads
      - logs_data:/app/backend/logs
      - backups_data:/app/backend/backups
    # Bind só ao loopback: o Nginx (mesma rede interna) faz o proxy. Não expor a
    # app diretamente à internet (Swagger/health detalhado contornariam o Nginx).
    ports:
      - "127.0.0.1:3000:3000"
    networks:
      - sispat-network
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  # ===========================================
  # Nginx (Proxy Reverso)
  # ===========================================
  nginx:
    image: nginx:alpine
    container_name: sispat-nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/conf.d:/etc/nginx/conf.d:ro
      - ./nginx/ssl:/etc/nginx/ssl:ro
      - uploads_data:/var/www/uploads:ro
    networks:
      - sispat-network
    depends_on:
      - sispat
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost/health"]
      interval: 30s
      timeout: 10s
      retries: 3

# ===========================================
# Volumes Persistentes
# ===========================================
volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local
  uploads_data:
    driver: local
  logs_data:
    driver: local
  backups_data:
    driver: local

# ===========================================
# Rede
# ===========================================
networks:
  sispat-network:
    driver: bridge
    ipam:
      config:
        - subnet: 172.20.0.0/16
