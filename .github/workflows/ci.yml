name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  # =====================================================================
  # Backend: lint + type-check + test (com Postgres real)
  # =====================================================================
  backend:
    name: Backend
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_USER: test
          POSTGRES_PASSWORD: test
          POSTGRES_DB: sispat_test
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: backend/package-lock.json

      - name: Install dependencies
        working-directory: ./backend
        run: npm ci

      - name: Generate Prisma Client
        working-directory: ./backend
        run: npx prisma generate

      - name: Run database migrations
        working-directory: ./backend
        run: npx prisma migrate deploy
        env:
          DATABASE_URL: postgresql://test:test@localhost:5432/sispat_test

      - name: Lint
        working-directory: ./backend
        run: npm run lint

      - name: Type check
        working-directory: ./backend
        run: npm run type-check

      - name: Tests
        working-directory: ./backend
        run: npm test
        env:
          DATABASE_URL: postgresql://test:test@localhost:5432/sispat_test
          JWT_SECRET: test-secret-key-for-ci-cd-minimum-32-characters-long
          NODE_ENV: test

      - name: npm audit (high & critical block CI)
        working-directory: ./backend
        run: npm audit --omit=dev --audit-level=high
        continue-on-error: false

  # =====================================================================
  # Frontend: lint + type-check + test + build (com bundle size check)
  # =====================================================================
  frontend:
    name: Frontend
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v2
        with:
          version: 8

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm run lint

      - name: Type check
        run: pnpm run type-check

      - name: Tests
        run: pnpm test

      - name: Build
        run: pnpm run build
        env:
          VITE_API_URL: https://api.example.com

      - name: Check bundle size (alerta acima de 5MB)
        run: |
          size=$(du -sk dist | cut -f1)
          echo "Bundle size: ${size}KB"
          if [ "$size" -gt 5120 ]; then
            echo "::warning::Bundle size ${size}KB excede 5MB — revisar dependências"
          fi

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: frontend-dist
          path: dist
          retention-days: 7

      - name: pnpm audit (high & critical block CI)
        run: pnpm audit --prod --audit-level high
        continue-on-error: false

  # =====================================================================
  # Build validation (consolida que ambos buildam)
  # =====================================================================
  build-validation:
    name: Build Validation
    runs-on: ubuntu-latest
    needs: [backend, frontend]
    steps:
      - name: All checks passed
        run: echo "✅ Backend + Frontend OK"
