name: Deploy SISPAT to Production

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  test:
    name: Gate (lint + type-check + test + build)
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'

    - name: Install pnpm
      run: npm install -g pnpm

    # ---------- Pacote compartilhado (@sispat/shared) ----------
    # Frontend e backend dependem de shared/dist (gitignored). Compilar ANTES
    # de buildar backend e frontend.
    - name: Build shared package
      working-directory: shared
      run: npm install && npm run build

    # ---------- Backend (gate completo) ----------
    - name: Install backend dependencies
      working-directory: backend
      run: npm ci

    - name: Generate Prisma client
      working-directory: backend
      run: npx prisma generate

    - name: Backend lint
      working-directory: backend
      run: npm run lint

    - name: Backend type-check
      working-directory: backend
      run: npm run type-check

    - name: Backend tests
      working-directory: backend
      run: npm test

    - name: Backend build
      working-directory: backend
      run: npm run build

    # ---------- Frontend ----------
    - name: Install frontend dependencies
      run: pnpm install --frozen-lockfile

    - name: Frontend lint
      run: pnpm run lint

    - name: Frontend tests
      run: pnpm run test

    - name: Build frontend
      run: pnpm run build

  deploy:
    name: Deploy to production
    needs: test
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'

    steps:
    - name: Deploy via SSH (build no servidor)
      uses: appleboy/ssh-action@v1.0.0
      with:
        host: ${{ secrets.PROD_HOST }}
        username: ${{ secrets.PROD_USER }}
        key: ${{ secrets.PROD_SSH_KEY }}
        script: |
          cd /opt/sispat
          git pull origin main
          # docker-compose.prod.yml monta o serviço da app via `build:` (Dockerfile
          # raiz, multi-stage), não por imagem de registry — por isso buildamos no
          # servidor com --build em vez de `pull`.
          docker-compose -f docker-compose.prod.yml up -d --build
          # Aplicar migrations do banco no container da app (DATABASE_URL já está
          # no env do serviço). O CLI prisma é devDep e foi podado da imagem, então
          # usamos `npx --yes prisma` apontando para o schema copiado.
          docker-compose -f docker-compose.prod.yml exec -T sispat \
            npx --yes prisma migrate deploy --schema backend/prisma/schema.prisma
          docker image prune -f

    - name: Health check
      run: |
        sleep 30
        curl -f http://${{ secrets.PROD_HOST }}/health || exit 1
