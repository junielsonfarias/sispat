version: '3.8'

# =======================================
# DOCKER COMPOSE - AMBIENTE STAGING
# SISPAT - Sistema de Patrimônio
# =======================================

services:
  # ===== APLICAÇÃO SISPAT =====
  sispat-app:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        NODE_ENV: production
        BUILD_DATE: ${BUILD_DATE}
        VCS_REF: ${VCS_REF}
    image: sispat:staging
    container_name: sispat-staging
    restart: unless-stopped

    environment:
      # Aplicação
      NODE_ENV: production
      PORT: 3000

      # Base de dados
      DATABASE_URL: postgresql://sispat_user:${DB_PASSWORD}@postgres:5432/sispat_staging

      # Cache
      REDIS_URL: redis://redis:6379/0

      # Autenticação
      NEXTAUTH_URL: https://sispat-staging.exemplo.com
      NEXTAUTH_SECRET: ${NEXTAUTH_SECRET}

      # Features
      ENABLE_METRICS: 'true'
      ENABLE_CACHE: 'true'
      RUN_MIGRATIONS: 'true'

      # Logs
      LOG_LEVEL: info
      LOG_FORMAT: json

      # Monitoramento
      HEALTH_CHECK_INTERVAL: 30

    ports:
      - '3000:3000'

    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

    networks:
      - sispat-staging

    volumes:
      - app-logs:/app/logs
      - app-uploads:/app/uploads

    healthcheck:
      test: ['CMD', './health-check.sh']
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

    labels:
      - 'traefik.enable=true'
      - 'traefik.http.routers.sispat-staging.rule=Host(`sispat-staging.exemplo.com`)'
      - 'traefik.http.routers.sispat-staging.tls=true'
      - 'traefik.http.routers.sispat-staging.tls.certresolver=letsencrypt'

  # ===== BANCO DE DADOS =====
  postgres:
    image: postgres:15-alpine
    container_name: sispat-postgres-staging
    restart: unless-stopped

    environment:
      POSTGRES_DB: sispat_staging
      POSTGRES_USER: sispat_user
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_INITDB_ARGS: '--encoding=UTF-8 --lc-collate=C --lc-ctype=C'

    ports:
      - '5432:5432'

    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./docker/postgres/init.sql:/docker-entrypoint-initdb.d/init.sql:ro

    networks:
      - sispat-staging

    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U sispat_user -d sispat_staging']
      interval: 10s
      timeout: 5s
      retries: 5

    command: >
      postgres
      -c shared_preload_libraries=pg_stat_statements
      -c pg_stat_statements.track=all
      -c max_connections=100
      -c shared_buffers=256MB
      -c effective_cache_size=1GB
      -c work_mem=4MB
      -c maintenance_work_mem=64MB

  # ===== CACHE REDIS =====
  redis:
    image: redis:7-alpine
    container_name: sispat-redis-staging
    restart: unless-stopped

    command: >
      redis-server
      --appendonly yes
      --appendfsync everysec
      --maxmemory 512mb
      --maxmemory-policy allkeys-lru
      --timeout 300
      --tcp-keepalive 60

    ports:
      - '6379:6379'

    volumes:
      - redis-data:/data

    networks:
      - sispat-staging

    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 10s
      timeout: 3s
      retries: 5

  # ===== PROXY REVERSO =====
  traefik:
    image: traefik:v3.0
    container_name: sispat-traefik-staging
    restart: unless-stopped

    command:
      - '--api.dashboard=true'
      - '--api.insecure=true'
      - '--providers.docker=true'
      - '--providers.docker.exposedbydefault=false'
      - '--entrypoints.web.address=:80'
      - '--entrypoints.websecure.address=:443'
      - '--certificatesresolvers.letsencrypt.acme.httpchallenge=true'
      - '--certificatesresolvers.letsencrypt.acme.httpchallenge.entrypoint=web'
      - '--certificatesresolvers.letsencrypt.acme.email=admin@exemplo.com'
      - '--certificatesresolvers.letsencrypt.acme.storage=/letsencrypt/acme.json'

    ports:
      - '80:80'
      - '443:443'
      - '8080:8080' # Dashboard

    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - traefik-certs:/letsencrypt

    networks:
      - sispat-staging

  # ===== MONITORAMENTO =====
  prometheus:
    image: prom/prometheus:latest
    container_name: sispat-prometheus-staging
    restart: unless-stopped

    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--web.console.libraries=/etc/prometheus/console_libraries'
      - '--web.console.templates=/etc/prometheus/consoles'
      - '--storage.tsdb.retention.time=200h'
      - '--web.enable-lifecycle'

    ports:
      - '9090:9090'

    volumes:
      - ./docker/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus-data:/prometheus

    networks:
      - sispat-staging

  grafana:
    image: grafana/grafana:latest
    container_name: sispat-grafana-staging
    restart: unless-stopped

    environment:
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_PASSWORD}
      GF_USERS_ALLOW_SIGN_UP: 'false'

    ports:
      - '3001:3000'

    volumes:
      - grafana-data:/var/lib/grafana
      - ./docker/grafana/dashboards:/etc/grafana/provisioning/dashboards:ro
      - ./docker/grafana/datasources:/etc/grafana/provisioning/datasources:ro

    networks:
      - sispat-staging

# ===== REDES =====
networks:
  sispat-staging:
    driver: bridge
    name: sispat-staging

# ===== VOLUMES =====
volumes:
  postgres-data:
    name: sispat-postgres-staging-data
  redis-data:
    name: sispat-redis-staging-data
  app-logs:
    name: sispat-app-staging-logs
  app-uploads:
    name: sispat-app-staging-uploads
  traefik-certs:
    name: sispat-traefik-staging-certs
  prometheus-data:
    name: sispat-prometheus-staging-data
  grafana-data:
    name: sispat-grafana-staging-data
